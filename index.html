<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BEU Syllabus</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(255,255,255,0.08);
    --text: #ffffff;
}

.light {
    --bg: #f1f5f9;
    --card: rgba(0,0,0,0.05);
    --text: #111;
}

body {
    margin: 0;
    height: 100vh;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    transition: 0.4s;
}

/* container */
.container {
    background: var(--card);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    backdrop-filter: blur(20px);
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

/* heading fix */
h1 {
    color: var(--text);
    margin-bottom: 20px;
    font-size: 22px;
}

/* dropdown */
select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: var(--text);
}

/* button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
    color: white;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* toggle switch */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #00c6ff;
    padding: 8px 12px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.footer {
    margin-top: 10px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌙 / ☀️</div>

<div class="container">
    <h1>📘 BEU Syllabus</h1>

    <select id="semester">
        <option value="">Select Semester</option>
        <option value="sem1">Semester 1</option>
        <option value="sem2">Semester 2</option>
        <option value="sem3">Semester 3</option>
        <option value="sem4">Semester 4</option>
        <option value="sem5">Semester 5</option>
        <option value="sem6">Semester 6</option>
        <option value="sem7">Semester 7</option>
        <option value="sem8">Semester 8</option>
    </select>

    <select id="branch">
        <option value="">Select Branch</option>
        <option value="cse">CSE</option>
        <option value="ece">ECE</option>
        <option value="me">ME</option>
        <option value="ee">EE</option>
        <option value="civil">Civil</option>
    </select>

    <button onclick="openPDF()">🚀 Open Syllabus</button>

    <div class="footer">Now looks clean 🔥</div>
</div>

<script>
// theme toggle
function toggleTheme() {
    document.body.classList.toggle("light");
}

// pdf
let links = {
    "ece_sem8": "https://drive.google.com/file/d/1wR1EOGB1dKZTmYUl2nKnmixI8pU0-1ig/view?usp=drivesdk"
};

function openPDF() {
    let sem = document.getElementById("semester").value;
    let branch = document.getElementById("branch").value;

    if (!sem || !branch) {
        alert("Select both!");
        return;
    }

    let key = branch + "_" + sem;

    if (links[key]) {
        window.open(links[key], "_blank");
    } else {
        alert("Not available");
    }
}
</script>

</body>
</html>
