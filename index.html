<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEU Syllabus</title>

<style>
:root {
    --bg: #f8fafc;
    --card: white;
    --text: #0f172a;
}

.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: white;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* container */
.container {
    width: 90%;
    max-width: 420px;
    padding: 30px;
    border-radius: 20px;
    background: var(--card);
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    animation: fadeIn 1s ease;
    position: relative;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1;}
}

h1 {
    color: var(--text);
}

/* dropdown */
select {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    font-size: 15px;
    transition: 0.3s;
}

select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 10px rgba(37,99,235,0.3);
    outline: none;
}

/* button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-top: 15px;
    font-size: 16px;
    color: white;
    background: linear-gradient(45deg,#2563eb,#3b82f6);
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(37,99,235,0.5);
}

/* submit button */
.submit-btn {
    background: #10b981;
}

/* hidden */
.hidden {
    display: none;
}

/* animation */
.show {
    display: block;
    animation: slide 0.5s ease;
}

@keyframes slide {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1;}
}

/* message */
.msg {
    margin-top: 10px;
    font-size: 14px;
}

/* mobile */
@media (max-width: 600px) {
    body {
        padding: 10px;
        align-items: flex-start;
    }

    .container {
        margin-top: 40px;
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- theme toggle -->
    <button onclick="toggleTheme()" style="position:absolute;top:15px;right:15px;width:auto;padding:6px 10px;">
        🌙
    </button>

    <h1>📘 BEU Syllabus</h1>

    <!-- Semester -->
    <select id="semester" onchange="showBranch()">
        <option value="">Select Semester</option>
        <option value="sem1">Semester 1</option>
        <option value="sem2">Semester 2</option>
        <option value="sem3">Semester 3</option>
        <option value="sem4">Semester 4</option>
        <option value="sem5">Semester 5</option>
        <option value="sem6">Semester 6</option>
        <option value="sem7">Semester 7</option>
        <option value="sem8">Semester 8</option>
    </select>

    <!-- Branch -->
    <select id="branch" class="hidden">
        <option value="">Select Branch</option>
        <option value="cse">CSE</option>
        <option value="ece">ECE</option>
        <option value="me">ME</option>
        <option value="ee">EE</option>
        <option value="civil">Civil</option>
    </select>

    <!-- Download -->
    <button id="btn" class="hidden" onclick="openPDF()">⬇ Download Syllabus</button>

    <!-- Submit -->
    <button class="submit-btn" onclick="openForm()">📤 Submit Syllabus</button>

    <!-- Message -->
    <div id="msg" class="msg"></div>

</div>

<script>
// theme
function toggleTheme(){
    document.body.classList.toggle("dark");
}

// step flow
function showBranch() {
    if (semester.value) {
        branch.classList.remove("hidden");
        branch.classList.add("show");
    }
}

branch.addEventListener("change", () => {
    if (branch.value) {
        btn.classList.remove("hidden");
        btn.classList.add("show");
    }
});

// syllabus links
let links = {
    "ece_sem8": "https://drive.google.com/uc?export=download&id=1wR1EOGB1dKZTmYUl2nKnmixI8pU0-1ig"
};

// open PDF
function openPDF() {
    let key = branch.value + "_" + semester.value;

    if (links[key]) {
        msg.innerText = "✅ Download starting...";
        msg.style.color = "green";

        setTimeout(() => {
            window.open(links[key], "_blank");
        }, 400);
    } else {
        msg.innerText = "❌ Syllabus not available";
        msg.style.color = "red";
    }
}

// open google form
function openForm(){
    window.open("https://forms.gle/YOUR_FORM_LINK", "_blank");
}
</script>

</body>
</html>
