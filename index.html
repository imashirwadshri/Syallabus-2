<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEU Syllabus</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(255,255,255,0.08);
    --text: #ffffff;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* container */
.container {
    width: 90%;
    max-width: 420px;
    background: var(--card);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

/* heading */
h1 {
    color: var(--text);
    margin-bottom: 20px;
}

/* dropdown */
select {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    background: rgba(255,255,255,0.15);
    color: white;
}

/* button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-size: 17px;
    color: white;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    cursor: pointer;
}

/* mobile spacing */
@media (max-width: 500px) {
    .container {
        width: 95%;
        padding: 20px;
    }

    h1 {
        font-size: 20px;
    }
}

.footer {
    margin-top: 10px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="container">
    <h1>📘 BEU Syllabus</h1>

    <select id="semester">
        <option value="">Select Semester</option>
        <option value="sem1">Semester 1</option>
        <option value="sem2">Semester 2</option>
        <option value="sem3">Semester 3</option>
        <option value="sem4">Semester 4</option>
        <option value="sem5">Semester 5</option>
        <option value="sem6">Semester 6</option>
        <option value="sem7">Semester 7</option>
        <option value="sem8">Semester 8</option>
    </select>

    <select id="branch">
        <option value="">Select Branch</option>
        <option value="cse">CSE</option>
        <option value="ece">ECE</option>
        <option value="me">ME</option>
        <option value="ee">EE</option>
        <option value="civil">Civil</option>
    </select>

    <button onclick="openPDF()">🚀 Open Syllabus</button>

    <div class="footer">Now properly responsive 🔥</div>
</div>

<script>
let links = {
    "ece_sem8": "https://drive.google.com/file/d/1wR1EOGB1dKZTmYUl2nKnmixI8pU0-1ig/view?usp=drivesdk"
};

function openPDF() {
    let sem = document.getElementById("semester").value;
    let branch = document.getElementById("branch").value;

    if (!sem || !branch) {
        alert("Select both!");
        return;
    }

    let key = branch + "_" + sem;

    if (links[key]) {
        window.open(links[key], "_blank");
    } else {
        alert("Not available");
    }
}
</script>

</body>
</html>
