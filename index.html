<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEU Syllabus</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
    margin: 0;
    background: #f8fafc;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    background: white;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

select, input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    background: #2563eb;
    color: white;
    border: none;
}

.submit-btn {
    background: #10b981;
}
</style>
</head>

<body>

<div class="container">

<h2>📘 Download Syllabus</h2>

<select id="semester">
<option value="">Select Semester</option>
<option value="sem1">Semester 1</option>
<option value="sem2">Semester 2</option>
<option value="sem3">Semester 3</option>
<option value="sem4">Semester 4</option>
<option value="sem5">Semester 5</option>
<option value="sem6">Semester 6</option>
<option value="sem7">Semester 7</option>
<option value="sem8">Semester 8</option>
</select>

<select id="branch">
<option value="">Select Branch</option>
<option value="cse">CSE</option>
<option value="ece">ECE</option>
<option value="me">ME</option>
<option value="ee">EE</option>
<option value="civil">Civil</option>
</select>

<button onclick="openPDF()">⬇ Download</button>

<hr>

<h2>📤 Submit Syllabus</h2>

<input type="text" id="name" placeholder="Your Name">

<select id="branchInput">
<option value="">Select Branch</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="ME">ME</option>
<option value="EE">EE</option>
<option value="CIVIL">CIVIL</option>
</select>

<select id="semInput">
<option value="">Select Semester</option>
<option value="Semester 1">Semester 1</option>
<option value="Semester 2">Semester 2</option>
<option value="Semester 3">Semester 3</option>
<option value="Semester 4">Semester 4</option>
<option value="Semester 5">Semester 5</option>
<option value="Semester 6">Semester 6</option>
<option value="Semester 7">Semester 7</option>
<option value="Semester 8">Semester 8</option>
</select>

<input type="text" id="pdfLink" placeholder="Paste Google Drive PDF Link">

<button class="submit-btn" onclick="sendEmail()">Submit</button>

</div>

<script>
// INIT EMAILJS
emailjs.init("YOUR_PUBLIC_KEY");

// DOWNLOAD
function openPDF(){
    let sem = document.getElementById("semester").value;
    let branch = document.getElementById("branch").value;

    if(sem==="sem8" && branch==="ece"){
        window.open("https://drive.google.com/uc?export=download&id=1wR1EOGB1dKZTmYUl2nKnmixI8pU0-1ig");
    } else {
        alert("Not available");
    }
}

// SEND EMAIL
function sendEmail(){

let name = document.getElementById("name").value;
let branch = document.getElementById("branchInput").value;
let sem = document.getElementById("semInput").value;
let pdf = document.getElementById("pdfLink").value;

if(!name || !branch || !sem || !pdf){
    alert("Fill all fields!");
    return;
}

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
    name: name,
    branch: branch,
    semester: sem,
    pdf: pdf
})
.then(()=>{
    alert("✅ Submitted! Check your email");
})
.catch((err)=>{
    alert("❌ Error: "+JSON.stringify(err));
});
}
</script>

</body>
</html>
