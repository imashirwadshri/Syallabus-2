<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEU Syllabus</title>

<style>
body {
    margin: 0;
    background: #f8fafc;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* container */
.container {
    width: 90%;
    max-width: 420px;
    padding: 30px;
    border-radius: 20px;
    background: white;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1;}
}

h1 {
    color: #0f172a;
}

/* dropdown */
select {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    font-size: 15px;
    transition: 0.3s;
}

select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 10px rgba(37,99,235,0.3);
}

/* button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-top: 15px;
    font-size: 16px;
    color: white;
    background: linear-gradient(45deg,#2563eb,#3b82f6);
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(37,99,235,0.5);
}

/* hidden animation */
.hidden {
    display: none;
}

.show {
    display: block;
    animation: slide 0.5s ease;
}

@keyframes slide {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1;}
}

/* message */
.msg {
    margin-top: 10px;
    font-size: 14px;
    color: red;
}
</style>
</head>

<body>

<div class="container">
    <h1>📘 BEU Syllabus</h1>

    <!-- Semester -->
    <select id="semester" onchange="showBranch()">
        <option value="">Select Semester</option>
        <option value="sem1">Semester 1</option>
        <option value="sem2">Semester 2</option>
        <option value="sem3">Semester 3</option>
        <option value="sem4">Semester 4</option>
        <option value="sem5">Semester 5</option>
        <option value="sem6">Semester 6</option>
        <option value="sem7">Semester 7</option>
        <option value="sem8">Semester 8</option>
    </select>

    <!-- Branch -->
    <select id="branch" class="hidden">
        <option value="">Select Branch</option>
        <option value="cse">CSE</option>
        <option value="ece">ECE</option>
        <option value="me">ME</option>
        <option value="ee">EE</option>
        <option value="civil">Civil</option>
    </select>

    <!-- Button -->
    <button id="btn" class="hidden" onclick="openPDF()">⬇ Download Syllabus</button>

    <!-- Message -->
    <div id="msg" class="msg"></div>
</div>

<script>
// show branch
function showBranch() {
    if (semester.value) {
        branch.classList.remove("hidden");
        branch.classList.add("show");
    }
}

// show button
branch.addEventListener("change", () => {
    if (branch.value) {
        btn.classList.remove("hidden");
        btn.classList.add("show");
    }
});

// syllabus links
let links = {
    "ece_sem8": "https://drive.google.com/uc?export=download&id=1wR1EOGB1dKZTmYUl2nKnmixI8pU0-1ig"
};

// open or show message
function openPDF() {
    let key = branch.value + "_" + semester.value;

    if (links[key]) {
        msg.innerText = "Opening PDF...";
        msg.style.color = "green";

        setTimeout(() => {
            window.open(links[key], "_blank");
        }, 500);

    } else {
        msg.innerText = "❌ Syllabus not available for this selection";
        msg.style.color = "red";
    }
}
</script>

</body>
</html>
