<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEU Syllabus</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
    margin: 0;
    background: #f8fafc;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 90%;
    max-width: 420px;
    padding: 30px;
    border-radius: 20px;
    background: white;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

h1 { color: #0f172a; }

select, input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    color: white;
    background: linear-gradient(45deg,#2563eb,#3b82f6);
    cursor: pointer;
}

.submit-btn {
    background: #10b981;
}
</style>
</head>

<body>

<div class="container">
<h1>📘 BEU Syllabus</h1>

<!-- DOWNLOAD SYSTEM (UNCHANGED) -->
<select id="semester">
<option value="">Select Semester</option>
<option value="sem8">Semester 8</option>
</select>

<select id="branch">
<option value="">Select Branch</option>
<option value="ece">ECE</option>
</select>

<button onclick="openPDF()">⬇ Download</button>

<hr>

<!-- SUBMIT FORM -->
<h3>📤 Submit Syllabus</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="branchInput" placeholder="Branch">
<input type="text" id="semInput" placeholder="Semester">
<input type="text" id="pdfLink" placeholder="Paste Google Drive PDF Link">

<button class="submit-btn" onclick="sendEmail()">Submit</button>

</div>

<script>
// EMAILJS INIT
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

// DOWNLOAD
function openPDF(){
window.open("https://drive.google.com/uc?export=download&id=1wR1EOGB1dKZTmYUl2nKnmixI8pU0-1ig");
}

// SEND EMAIL
function sendEmail(){

let params = {
name: document.getElementById("name").value,
branch: document.getElementById("branchInput").value,
semester: document.getElementById("semInput").value,
pdf: document.getElementById("pdfLink").value
};

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",params)
.then(()=>{
alert("✅ Submitted successfully!");
})
.catch(()=>{
alert("❌ Error sending");
});

}
</script>

</body>
</html>
